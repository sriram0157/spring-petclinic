name: maven build workflow

on:
  workflow_dispatch:
  push:
    branches: '*'

jobs:
  maven_build:
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'main' }}
    steps:
      - name: Checkout repo branch
        uses: actions/checkout@v7

      - name: Install Java 
        run: |
          sudo apt update
          sudo apt install openjdk-17-jdk -y
          sudo apt install maven -y

